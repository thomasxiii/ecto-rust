<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ecto-rust</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #ffffff;
        --bg-muted: #f8fafc;
        --bg-sunken: #f1f5f9;
        --fg: #0f172a;
        --fg-muted: #64748b;
        --fg-subtle: #94a3b8;
        --border: #e2e8f0;
        --border-strong: #cbd5e1;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --accent-soft: #eff6ff;
        --danger: #ef4444;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.04);
        --shadow: 0 4px 12px -2px rgb(0 0 0 / 0.06), 0 2px 4px -2px rgb(0 0 0 / 0.04);
        --shadow-lg: 0 16px 40px -12px rgb(0 0 0 / 0.18), 0 4px 16px -4px rgb(0 0 0 / 0.08);
        --radius-sm: 4px;
        --radius: 6px;
        --radius-lg: 10px;
        --font-sans: "Inter var", "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: var(--font-sans);
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        font-size: 14px;
        line-height: 1.5;
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { display: flex; height: 100vh; }
      button { font-family: inherit; }
      input, textarea, select { font-family: inherit; }
      /* shadcn-like reusable bits */
      .ec-btn {
        display: inline-flex; align-items: center; justify-content: center;
        gap: 6px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 500;
        line-height: 1;
        background: var(--accent);
        color: #ffffff;
        border: 1px solid var(--accent);
        border-radius: var(--radius);
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
        box-shadow: var(--shadow-sm);
      }
      .ec-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
      .ec-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .ec-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .ec-btn-secondary {
        background: var(--bg);
        color: var(--fg);
        border-color: var(--border);
        box-shadow: var(--shadow-sm);
      }
      .ec-btn-secondary:hover { background: var(--bg-muted); border-color: var(--border-strong); }
      .ec-btn-ghost {
        background: transparent; color: var(--fg-muted); border-color: transparent;
        box-shadow: none;
      }
      .ec-btn-ghost:hover { background: var(--bg-muted); color: var(--fg); }
      .ec-input {
        display: block;
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }
      .ec-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgb(37 99 235 / 0.16); }
      .ec-textarea { resize: vertical; min-height: 96px; font-family: var(--font-sans); }
      .ec-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
